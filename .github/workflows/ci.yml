name: CI
on: [ push, pull_request ]

env:
  RUSTFLAGS: >-
    -Dwarnings
    -Clink-arg=-fuse-ld=mold
  RUST_BACKTRACE: 1

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        rust:
          - stable
          - beta
          - nightly
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - name: "Replace the pinned channel with 'stable'"
        run: sed -i 's/^channel = \".*\"/channel = \"stable\"/' rust-toolchain.toml
      - name: Set home dirs
        run: |
          echo "MISE_DATA_DIR=$RUNNER_TEMP/mise" >> "$GITHUB_ENV"
          echo "RUSTUP_HOME=$RUNNER_TEMP/mise/rustup" >> "$GITHUB_ENV" # RUSTUP_HOME must live under MISE_DATA_DIR, so that mise caches it automatically (it doesn't cache ~/.rustup)
          echo "CARGO_HOME=$RUNNER_TEMP/mise/cargo" >> "$GITHUB_ENV" # CARGO_HOME must live under MISE_DATA_DIR, so that mise caches it automatically (it doesn't cache ~/.cargo)
          echo "DENO_DIR=$RUNNER_TEMP/deno" >> "$GITHUB_ENV" # DENO_DIR must live outside MISE_DATA_DIR, so that actions/cache can save it after later Deno invocations
      - uses: rui314/setup-mold@v1 # mold is a workaround for regression in Rust 1.93 beta
      - uses: jdx/mise-action@v4
        with:
          cache_key: "{{default}}-${{ hashFiles('rust-toolchain.toml') }}"
          # cache_key must contain rust-toolchain.toml
      - uses: actions/cache@v5
        with:
          path: ${{ matrix.rust }}
          key: deno-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('mise.toml', '*.ts', 'deno.json', '**/deno.lock') }}
          # actions/cache saves in a post-job hook, so it captures modules downloaded by later Deno invocations
      - uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false # mise already caches CARGO_HOME
      - run: lefthook run --force pre-commit
      - run: "cargo hack test --feature-powerset -- --skip integration_tests::"
      - uses: wagoid/commitlint-github-action@v6
        with:
          failOnWarnings: true
          failOnErrors: true
